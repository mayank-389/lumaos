            initPaintApp() {
                const canvas = document.getElementById('paintCanvas');
                const colorInput = document.getElementById('paintColor');
                const sizeInput = document.getElementById('paintSize');
                const sizeValue = document.getElementById('paintSizeValue');

                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                ctx.fillStyle = '#1a1a24';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let isDrawing = false;
                let lastX = 0;
                let lastY = 0;

                sizeInput.addEventListener('input', (e) => {
                    sizeValue.textContent = e.target.value + 'px';
                });

                canvas.addEventListener('mousedown', (e) => {
                    isDrawing = true;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    lastX = (e.clientX - rect.left) * scaleX;
                    lastY = (e.clientY - rect.top) * scaleY;
                });

                canvas.addEventListener('mousemove', (e) => {
                    if (!isDrawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const currentX = (e.clientX - rect.left) * scaleX;
                    const currentY = (e.clientY - rect.top) * scaleY;

                    ctx.strokeStyle = colorInput.value;
                    ctx.lineWidth = sizeInput.value;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(currentX, currentY);
                    ctx.stroke();

                    lastX = currentX;
                    lastY = currentY;
                });

                canvas.addEventListener('mouseup', () => {
                    isDrawing = false;
                });

                canvas.addEventListener('mouseleave', () => {
                    isDrawing = false;
                });
            },


            filesCurrentPath: '/',

            getFileSystem() {
                const def = {
                    '/': {
                        'Documents': { _type: 'folder' },
                        'Pictures': { _type: 'folder' },
                        'Downloads': { _type: 'folder' },
                        'readme.txt': { _type: 'file', content: 'Welcome to Luma OS!\nThis is your personal file manager.\nYou can create, edit, rename and delete files and folders.' },
                    },
                    '/Documents': {
                        'notes.txt': { _type: 'file', content: 'My personal notes...' },
                        'todo.txt': { _type: 'file', content: '1. Learn JavaScript\n2. Build a Luma OS\n3. Have fun!' }
                    },
                    '/Pictures': {
                        'info.txt': { _type: 'file', content: 'Store your picture descriptions here.' }
                    },
                    '/Downloads': {}
                };
                const stored = localStorage.getItem('webos_filesystem');
                if (!stored) return def;
                try {
                    const parsed = JSON.parse(stored);
                    return parsed && typeof parsed === 'object' ? parsed : def;
                } catch (error) {
                    return def;
                }
            },

            saveFileSystem(fs) {
                localStorage.setItem('webos_filesystem', JSON.stringify(fs));
            },

            renderFilesApp() {
                return `
                    <div style="display: flex; flex-direction: column; height: 100%;">
                        <div id="filesToolbar" style="display: flex; gap: 8px; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); align-items: center; flex-wrap: wrap;">
                            <button class="app-button" onclick="OS.filesGoUp()" style="padding: 6px 12px; font-size: 12px;">⬆ Up</button>
                            <div id="filesBreadcrumb" style="flex: 1; font-size: 12px; opacity: 0.7; overflow: hidden; white-space: nowrap;"></div>
                            <button class="app-button" onclick="OS.filesNewFolder()" style="padding: 6px 12px; font-size: 12px;">📁 New Folder</button>
                            <button class="app-button" onclick="OS.filesNewFile()" style="padding: 6px 12px; font-size: 12px;">📄 New File</button>
                        </div>
                        <div id="filesContent" style="flex: 1; overflow-y: auto; padding: 10px;"></div>
                    </div>
                `;
            },

            initFilesApp() {
                this.filesCurrentPath = '/';
                this.renderFilesList();
            },

            renderFilesList() {
                const fs = this.getFileSystem();
                const items = fs[this.filesCurrentPath] || {};
                const container = document.getElementById('filesContent');
                const breadcrumb = document.getElementById('filesBreadcrumb');
                if (!container) return;


                const parts = this.filesCurrentPath.split('/').filter(Boolean);
                let bc = '<span style="cursor:pointer;color:rgba(255,255,255,0.85);" onclick="OS.filesNavigate(\'/\')">🏠 Root</span>';
                let cumulative = '';
                parts.forEach(p => {
                    cumulative += '/' + p;
                    const path = cumulative;
                    bc += ` <span style="opacity:0.4;"> / </span> <span style="cursor:pointer;color:rgba(255,255,255,0.85);" onclick="OS.filesNavigate('${path}')">${p}</span>`;
                });
                if (breadcrumb) breadcrumb.innerHTML = bc;

                const keys = Object.keys(items);
                if (keys.length === 0) {
                    container.innerHTML = '<div style="text-align:center; opacity:0.4; padding:40px;">This folder is empty</div>';
                    return;
                }


                const folders = keys.filter(k => items[k]._type === 'folder').sort();
                const files = keys.filter(k => items[k]._type === 'file').sort();
                const sorted = [...folders, ...files];

                container.innerHTML = sorted.map(name => {
                    const item = items[name];
                    const isFolder = item._type === 'folder';
                    const icon = isFolder ? '📁' : this.getFileIcon(name);
                    const size = isFolder ? '--' : (item.content || '').length + ' B';
                    return `
                        <div style="display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:6px; cursor:pointer; transition:background 0.15s; border: 1px solid transparent;"
                             onmouseover="this.style.background='rgba(255,255,255,0.08)';this.style.borderColor='rgba(255,255,255,0.1)'"
                             onmouseout="this.style.background='transparent';this.style.borderColor='transparent'"
                             ondblclick="OS.filesOpen('${name}')">
                            <span style="font-size:28px;">${icon}</span>
                            <div style="flex:1; min-width:0;">
                                <div style="font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${name}</div>
                                <div style="font-size:11px; opacity:0.4;">${isFolder ? 'Folder' : size}</div>
                            </div>
                            <div style="display:flex; gap:4px;">
                                <button class="app-button" onclick="event.stopPropagation(); OS.filesRename('${name}')" style="padding:4px 8px; font-size:11px;" title="Rename">✏️</button>
                                <button class="app-button" onclick="event.stopPropagation(); OS.filesDelete('${name}')" style="padding:4px 8px; font-size:11px; background:rgba(255,100,100,0.15); border-color:rgba(255,100,100,0.3);" title="Delete">🗑</button>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            getFileIcon(name) {
                const ext = name.split('.').pop().toLowerCase();
                const icons = { txt: '📄', md: '📝', js: '⚡', html: '🌐', css: '🎨', json: '📋', png: '🖼', jpg: '🖼', gif: '🖼', mp3: '🎵', mp4: '🎬', pdf: '📕' };
                return icons[ext] || '📄';
            },

            filesNavigate(path) {
                this.filesCurrentPath = path;
                this.renderFilesList();
            },

            filesGoUp() {
                if (this.filesCurrentPath === '/') return;
                const parts = this.filesCurrentPath.split('/').filter(Boolean);
                parts.pop();
                this.filesCurrentPath = parts.length === 0 ? '/' : '/' + parts.join('/');
                this.renderFilesList();
            },

            filesOpen(name) {
                const fs = this.getFileSystem();
                const items = fs[this.filesCurrentPath] || {};
                const item = items[name];
                if (!item) return;

                if (item._type === 'folder') {
                    const newPath = this.filesCurrentPath === '/' ? '/' + name : this.filesCurrentPath + '/' + name;
                    if (!fs[newPath]) fs[newPath] = {};
                    this.saveFileSystem(fs);
                    this.filesCurrentPath = newPath;
                    this.renderFilesList();
                } else {

                    this.filesEditFile(name, item.content || '');
                }
            },

            filesEditFile(name, content) {
                const container = document.getElementById('filesContent');
                if (!container) return;
                container.innerHTML = `
                    <div style="display:flex; flex-direction:column; height:100%; gap:8px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:13px; opacity:0.8;">📄 Editing: <strong>${name}</strong></span>
                            <div style="display:flex; gap:6px;">
                                <button class="app-button" onclick="OS.filesSaveFile('${name}')" style="padding:6px 14px; font-size:12px;">💾 Save</button>
                                <button class="app-button" onclick="OS.renderFilesList()" style="padding:6px 14px; font-size:12px;">✕ Close</button>
                            </div>
                        </div>
                        <textarea id="filesEditor" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:white; padding:12px; font-family:'Courier New',monospace; font-size:13px; resize:none; outline:none;">${content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                    </div>
                `;
            },

            filesSaveFile(name) {
                const editor = document.getElementById('filesEditor');
                if (!editor) return;
                const fs = this.getFileSystem();
                if (!fs[this.filesCurrentPath]) fs[this.filesCurrentPath] = {};
                fs[this.filesCurrentPath][name] = { _type: 'file', content: editor.value };
                this.saveFileSystem(fs);
                this.notify('💾 File saved!');
            },

            filesNewFolder() {
                const name = prompt('Enter folder name:');
                if (!name || !name.trim()) return;
                const fs = this.getFileSystem();
                if (!fs[this.filesCurrentPath]) fs[this.filesCurrentPath] = {};
                if (fs[this.filesCurrentPath][name.trim()]) {
                    this.notify('❌ A file or folder with that name already exists');
                    return;
                }
                fs[this.filesCurrentPath][name.trim()] = { _type: 'folder' };
                const newPath = this.filesCurrentPath === '/' ? '/' + name.trim() : this.filesCurrentPath + '/' + name.trim();
                if (!fs[newPath]) fs[newPath] = {};
                this.saveFileSystem(fs);
                this.renderFilesList();
                this.notify('📁 Folder created!');
            },

            filesNewFile() {
                const name = prompt('Enter file name (e.g. notes.txt):');
                if (!name || !name.trim()) return;
                const fs = this.getFileSystem();
                if (!fs[this.filesCurrentPath]) fs[this.filesCurrentPath] = {};
                if (fs[this.filesCurrentPath][name.trim()]) {
                    this.notify('❌ A file or folder with that name already exists');
                    return;
                }
                fs[this.filesCurrentPath][name.trim()] = { _type: 'file', content: '' };
                this.saveFileSystem(fs);
                this.renderFilesList();
                this.notify('📄 File created!');
            },

            filesRename(oldName) {
                const newName = prompt('Enter new name:', oldName);
                if (!newName || !newName.trim() || newName.trim() === oldName) return;
                const fs = this.getFileSystem();
                const dir = fs[this.filesCurrentPath];
                if (!dir || !dir[oldName]) return;
                if (dir[newName.trim()]) {
                    this.notify('❌ A file or folder with that name already exists');
                    return;
                }
                const item = dir[oldName];
                dir[newName.trim()] = item;
                delete dir[oldName];

                if (item._type === 'folder') {
                    const oldPath = this.filesCurrentPath === '/' ? '/' + oldName : this.filesCurrentPath + '/' + oldName;
                    const newPath = this.filesCurrentPath === '/' ? '/' + newName.trim() : this.filesCurrentPath + '/' + newName.trim();
                    this.renameFolderPaths(fs, oldPath, newPath);
                }
                this.saveFileSystem(fs);
                this.renderFilesList();
                this.notify('✏️ Renamed!');
            },

            filesDelete(name) {
                if (!confirm(`Delete "${name}"?`)) return;
                const fs = this.getFileSystem();
                const dir = fs[this.filesCurrentPath];
                if (!dir || !dir[name]) return;


                if (dir[name]._type === 'folder') {
                    const folderPath = this.filesCurrentPath === '/' ? '/' + name : this.filesCurrentPath + '/' + name;
                    this.deleteFolderPaths(fs, folderPath);
                }
                delete dir[name];
                this.saveFileSystem(fs);
                this.renderFilesList();
                this.notify('🗑 Deleted!');
            },

            renameFolderPaths(fs, oldPath, newPath) {
                const updated = {};
                Object.keys(fs).forEach(path => {
                    if (path === oldPath || path.startsWith(oldPath + '/')) {
                        const renamedPath = newPath + path.slice(oldPath.length);
                        updated[renamedPath] = fs[path];
                        delete fs[path];
                    }
                });
                Object.assign(fs, updated);
            },

            deleteFolderPaths(fs, folderPath) {
                Object.keys(fs).forEach(path => {
                    if (path === folderPath || path.startsWith(folderPath + '/')) {
                        delete fs[path];
                    }
                });
            },

            clockToggleStopwatch() {
                const btn = document.getElementById('stopwatchBtn');
                if (this.stopwatchRunning) {
                    clearInterval(this.stopwatchInterval);
                    this.stopwatchElapsed += Date.now() - this.stopwatchStart;
                    this.stopwatchRunning = false;
                    if (btn) btn.textContent = '⏱ Start';
                } else {
                    this.stopwatchStart = Date.now();
                    this.stopwatchRunning = true;
                    if (btn) btn.textContent = '⏸ Pause';
                    this.stopwatchInterval = setInterval(() => {
                        const total = this.stopwatchElapsed + (Date.now() - this.stopwatchStart);
                        const mins = Math.floor(total / 60000);
                        const secs = Math.floor((total % 60000) / 1000);
                        const ms = Math.floor((total % 1000) / 10);
                        const d = document.getElementById('stopwatchDisplay');
                        if (d) d.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
                    }, 50);
                }
            },

            clockResetStopwatch() {
                clearInterval(this.stopwatchInterval);
                this.stopwatchRunning = false;
                this.stopwatchElapsed = 0;
                const d = document.getElementById('stopwatchDisplay');
                const btn = document.getElementById('stopwatchBtn');
                if (d) d.textContent = '00:00.00';

            },

            executeTerminalCommand() {
                const input = document.getElementById('terminalInput');
                const output = document.getElementById('terminalOutput');
                if (!input || !output) return;

                const command = input.value.trim();
                if (!command) return;


                output.textContent += '$ ' + command + '\n';

                let result = '';
                const parts = command.split(' ');
                const cmd = parts[0].toLowerCase();
                const args = parts.slice(1).join(' ');

                switch (cmd) {
                    case 'help':
                        result = `Available commands:
  help         - Show this help message
  clear        - Clear terminal screen
  date         - Show full date and time
  time         - Show current time
  whoami       - Show current user
  system       - Show system info
  neofetch     - Show detailed system info
  ls           - List directories
  pwd          - Show current directory
  version      - Show OS version
  uptime       - Show uptime
  uname        - Show user agent info
  echo <text>  - Echo text
  calc <expr>  - Calculate math expression (e.g. calc 2+2)
  weather      - Show mock weather
  notes list   - List notes
  todo list    - List todos`;
                        break;
                    case 'clear':
                        output.textContent = 'Luma OS Terminal v1.0\nType \'help\' for available commands\n___________________________________\n';
                        input.value = '';
                        return;
                    case 'date':
                        result = new Date().toLocaleString();
                        break;
                    case 'time':
                        result = new Date().toLocaleTimeString();
                        break;
                    case 'whoami':
                        result = 'User@WebOS';
                        break;
                    case 'system':
                        result = `Luma OS v1.0
Kernel: JavaScript Runtime
Browser: ${navigator.userAgent.substring(0, 50)}...
Uptime: ${Math.floor(performance.now() / 1000)}s`;
                        break;
                    case 'neofetch':
                        result = `       ___
      / _ \\
     / (o) \\
    /   |    \\
       / \\

OS: Luma OS v1.0
Kernel: JavaScript
Shell: Browser Shell
CPU: Virtual
RAM: 8GB
Storage: localStorage
Uptime: ${Math.floor(performance.now() / 1000)}s`;
                        break;
                    case 'ls':
                        result = `notes/
calculator/
todo/
browser/
settings/
terminal/`;
                        break;
                    case 'pwd':
                        result = '/home/webos';
                        break;
                    case 'version':
                        result = 'Luma OS version 1.0\nBuild: JavaScript ES6\nRelease: 2024';
                        break;
                    case 'uptime':
                        result = Math.floor(performance.now() / 1000) + ' seconds';
                        break;
                    case 'uname':
                        result = navigator.userAgent;
                        break;
                    case 'echo':
                        result = args;
                        break;
                    case 'calc':
                        try {
                            if (!args) {
                                result = 'Usage: calc <expression> (e.g. calc 2+2*3)';
                            } else {
                                result = eval(args);
                            }
                        } catch (e) {
                            result = 'Error: Invalid expression';
                        }
                        break;
                    case 'weather':
                        result = `📊 Weather Report
Temperature: 72°F
Conditions: Sunny
Humidity: 65%
Wind: 10 mph NE
UV Index: 5 (Moderate)`;
                        break;
                    case 'notes':
                        if (args === 'list') {
                            const notes = localStorage.getItem('webos_notes') || '';
                            result = notes ? notes.substring(0, 100) + (notes.length > 100 ? '...' : '') : 'No notes';
                        } else {
                            result = 'Usage: notes list';
                        }
                        break;
                    case 'todo':
                        if (args === 'list') {
                            const todos = JSON.parse(localStorage.getItem('webos_todos') || '[]');
                            if (todos.length === 0) {
                                result = 'No todos';
                            } else {
                                result = todos.map(t => (t.completed ? '✓' : '○') + ' ' + t.text).join('\n');
                            }
                        } else {
                            result = 'Usage: todo list';
                        }
                        break;
                    default:
                        result = `${cmd}: command not found. Type 'help' for available commands.`;
                }

                output.textContent += result + '\n\n';
                output.scrollTop = output.scrollHeight;
                input.value = '';
                input.focus();
            },

                    'Music': [{ n: 'song1.mp3', s: '4.2 MB' }, { n: 'song2.mp3', s: '3.8 MB' }],
                    'Videos': [{ n: 'video.mp4', s: '245 MB' }, { n: 'tutorial.mp4', s: '128 MB' }],
                    'Desktop': [{ n: 'project.zip', s: '8.5 MB' }, { n: 'presentation.pptx', s: '15.2 MB' }]
                };
                this.displayFiles('Home');
            },

            openFolder(name) {
                this.currentFolder = name;
                const pathInput = document.getElementById('pathInput');
                if (pathInput) pathInput.value = `/Home/${name}`;
                this.displayFiles(name);
            },

            filesGoBack() {
                if (this.currentFolder !== 'Home') {
                    this.currentFolder = 'Home';
                    const pathInput = document.getElementById('pathInput');
                    if (pathInput) pathInput.value = '/Home';
                    this.displayFiles('Home');
                }
            },

            displayFiles(folder) {
                const container = document.getElementById('filesContainer');
                const folderName = document.getElementById('folderName');
                if (!container) return;
                const files = this.filesData[folder] || [];
                if (folderName) folderName.textContent = folder;
                container.innerHTML = files.map((f, i) => `
                    <div style="padding:12px 8px;border-radius:6px;cursor:pointer;text-align:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);transition:all 0.2s;font-size:12px;" onmouseover="this.style.background='rgba(255,255,255,0.08);this.style.borderColor='rgba(102,126,234,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.03);this.style.borderColor='rgba(255,255,255,0.08)'" ondblclick="OS.notify('Opening: ${f.n}')">
                        <div style="font-size:24px;margin-bottom:6px;opacity:0.6;">${f.n.endsWith('.exe') ? '⬇' : f.n.endsWith('.mp4') ? '▶' : f.n.endsWith('.mp3') ? '♪' : f.n.endsWith(/.jpg|.png/) ? '▭' : '▢'}</div>
                        <div style="font-weight:500;word-break:break-all;">${f.n}</div>
                        <div style="font-size:10px;opacity:0.5;margin-top:4px;">${f.s}</div>
                    </div>
                `).join('');
            },

            renderMusicApp() {
                const tracks = [{ t: 'Chill Vibes', a: 'Lo-Fi Artist', d: '3:24' }, { t: 'Night Drive', a: 'Synthwave', d: '4:12' }, { t: 'Morning Dew', a: 'Ambient', d: '5:01' }, { t: 'Electric Feel', a: 'Indie Pop', d: '3:48' }];
                return `<div style="text-align:center;padding:10px 0 16px;">
                    <div style="font-size:56px;margin-bottom:8px;">🎵</div>
                    <div id="musicTitle" style="font-size:16px;font-weight:600;">Chill Vibes</div>
                    <div id="musicArtist" style="font-size:12px;opacity:0.5;margin-top:4px;">Lo-Fi Artist</div>
                    <div style="display:flex;justify-content:center;gap:12px;margin:14px 0;">
                        <button class="app-button" onclick="OS.musicPrev()" style="padding:8px 14px;">⏮</button>
                        <button class="app-button" id="musicPlayBtn" onclick="OS.musicToggle()" style="padding:8px 20px;">▶</button>
                        <button class="app-button" onclick="OS.musicNext()" style="padding:8px 14px;">⏭</button>
                    </div>
                    <div style="margin:0 20px 12px;background:rgba(255,255,255,0.08);border-radius:4px;height:4px;">
                        <div id="musicProgress" style="width:0%;height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:4px;transition:width .3s;"></div>
                    </div>
                </div>
                <div style="border-top:1px solid rgba(255,255,255,0.08);padding:8px 16px;">
                    ${tracks.map((t, i) => `<div id="mtrack${i}" onclick="OS.musicSelect(${i})" style="display:flex;justify-content:space-between;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;background:${i === 0 ? 'rgba(102,126,234,0.2)' : 'transparent'}" onmouseover="this.style.background='rgba(255,255,255,0.07)'" onmouseout="this.style.background='${i === 0 ? 'rgba(102,126,234,0.2)' : 'transparent'}'"><span>${t.t} <span style="opacity:0.4;font-size:11px;">— ${t.a}</span></span><span style="opacity:0.4;">${t.d}</span></div>`).join('')}
                </div>`;
            },

            initMusicApp() {
                this.musicState = { track: 0, playing: false, progress: 0 };
                this._tracks = [{ t: 'Chill Vibes', a: 'Lo-Fi Artist' }, { t: 'Night Drive', a: 'Synthwave' }, { t: 'Morning Dew', a: 'Ambient' }, { t: 'Electric Feel', a: 'Indie Pop' }];
            },

            musicToggle() {
                if (!this.musicState) return;
                this.musicState.playing = !this.musicState.playing;
                const btn = document.getElementById('musicPlayBtn');
                if (btn) btn.textContent = this.musicState.playing ? '⏸' : '▶';
                if (this.musicState.playing) {
                    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();

                    this.osc = this.audioCtx.createOscillator();
                    this.osc.type = 'triangle';
                    this.gainNode = this.audioCtx.createGain();
                    this.gainNode.gain.value = 0.1;

                    const notes = [440, 554.37, 659.25, 880];
                    let time = this.audioCtx.currentTime;
                    for (let i = 0; i < 100; i++) {
                        this.osc.frequency.setValueAtTime(notes[i % 4], time + i * 0.25);
                    }

                    this.osc.connect(this.gainNode);
                    this.gainNode.connect(this.audioCtx.destination);
                    this.osc.start();

                    this._musicTimer = setInterval(() => {
                        this.musicState.progress = Math.min(100, this.musicState.progress + 0.5);
                        const bar = document.getElementById('musicProgress');
                        if (bar) bar.style.width = this.musicState.progress + '%';
                        if (this.musicState.progress >= 100) this.musicNext();
                    }, 300);
                } else {
                    clearInterval(this._musicTimer);
                    if (this.osc) {
                        this.osc.stop();
                        this.osc.disconnect();
                        this.osc = null;
                    }
                }
            },

            musicSelect(i) {
                clearInterval(this._musicTimer);
                this.musicState = { track: i, playing: false, progress: 0 };
                const t = this._tracks[i];
                const title = document.getElementById('musicTitle');
                const artist = document.getElementById('musicArtist');
                if (title) title.textContent = t.t;
                if (artist) artist.textContent = t.a;
                const bar = document.getElementById('musicProgress');
                if (bar) bar.style.width = '0%';
                const btn = document.getElementById('musicPlayBtn');
                if (btn) btn.textContent = '▶';
                document.querySelectorAll('[id^=mtrack]').forEach((el, idx) => {
                    el.style.background = idx === i ? 'rgba(102,126,234,0.2)' : 'transparent';
                });
            },

            musicNext() { if (this.musicState) this.musicSelect((this.musicState.track + 1) % this._tracks.length); },
            musicPrev() { if (this.musicState) this.musicSelect((this.musicState.track - 1 + this._tracks.length) % this._tracks.length); },

            renderClockApp() {
                return `<div style="text-align:center;padding:20px 0;">
                    <canvas id="analogClock" width="200" height="200" style="display:block;margin:0 auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));"></canvas>
                    <div id="clockDisplay" style="font-size:28px;font-weight:200;letter-spacing:2px;font-family:monospace;margin-top:12px;"></div>
                    <div id="clockDate" style="font-size:12px;opacity:0.5;margin-top:4px;"></div>
                    <div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.08);padding-top:16px;">
                        <div style="font-size:11px;opacity:0.4;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">Stopwatch</div>
                        <div id="swDisplay" style="font-size:24px;font-family:monospace;margin-bottom:10px;">00:00.0</div>
                        <div style="display:flex;justify-content:center;gap:10px;">
                            <button class="app-button" id="swBtn" onclick="OS.swToggle()" style="padding:8px 16px;">Start</button>
                            <button class="app-button" onclick="OS.swReset()" style="padding:8px 16px;">Reset</button>
                        </div>
                    </div>
                </div>`;
            },

            initClockApp() {
                this.swState = { running: false, elapsed: 0, start: 0 };
                const drawAnalogClock = () => {
                    const canvas = document.getElementById('analogClock');
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const radius = canvas.width / 2;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.translate(radius, radius);
                    const d = new Date();
                    const h = (d.getHours() % 12) + d.getMinutes() / 60;
                    const m = d.getMinutes() + d.getSeconds() / 60;
                    const s = d.getSeconds();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 8;
                    ctx.beginPath();
                    ctx.arc(0, 0, radius - 12, 0, 2 * Math.PI);
                    ctx.stroke();
                    for (let i = 0; i < 12; i++) {
                        ctx.save();
                        ctx.rotate(i * Math.PI / 6);
                        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(0, -radius + 16);
                        ctx.lineTo(0, -radius + 6);
                        ctx.stroke();
                        ctx.restore();
                    }
                    const drawHand = (angle, len, width, color) => {
                        ctx.save();
                        ctx.rotate(angle);
                        ctx.strokeStyle = color;
                        ctx.lineWidth = width;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(0, -len);
                        ctx.stroke();
                        ctx.restore();
                    };
                    drawHand(h * Math.PI / 6, radius * 0.5, 6, 'rgba(255,255,255,0.9)');
                    drawHand(m * Math.PI / 30, radius * 0.7, 4, 'rgba(255,255,255,0.8)');
                    drawHand(s * Math.PI / 30, radius * 0.8, 2, 'rgba(102,126,234,0.9)');
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.beginPath();
                    ctx.arc(0, 0, 6, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.translate(-radius, -radius);
                };
                const tick = () => {
                    const d = new Date();
                    const el = document.getElementById('clockDisplay');
                    const dl = document.getElementById('clockDate');
                    drawAnalogClock();
                    if (el) el.textContent = d.toLocaleTimeString('en-US', { hour12: false });
                    if (dl) dl.textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    if (this.swState && this.swState.running) {
                        const ms = this.swState.elapsed + (Date.now() - this.swState.start);
                        const s = Math.floor(ms / 1000);
                        const sw = document.getElementById('swDisplay');
                        if (sw) sw.textContent = `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}.${Math.floor((ms % 1000) / 100)}`;
                    }
                    requestAnimationFrame(tick);
                };
                tick();
            },

            swToggle() {
                if (!this.swState) return;
                this.swState.running = !this.swState.running;
                const btn = document.getElementById('swBtn');
                if (this.swState.running) { this.swState.start = Date.now(); if (btn) btn.textContent = 'Stop'; }
                else { this.swState.elapsed += Date.now() - this.swState.start; if (btn) btn.textContent = 'Start'; }
            },

            swReset() {
                this.swState = { running: false, elapsed: 0, start: 0 };
                const sw = document.getElementById('swDisplay');
                if (sw) sw.textContent = '00:00.0';
                const btn = document.getElementById('swBtn');
                if (btn) btn.textContent = 'Start';
            },

            renderWeatherApp() {
                const days = [{ d: 'Mon', i: '☀️', h: 78, l: 62 }, { d: 'Tue', i: '⛅', h: 72, l: 58 }, { d: 'Wed', i: '🌧️', h: 65, l: 54 }, { d: 'Thu', i: '🌤️', h: 70, l: 57 }, { d: 'Fri', i: '☀️', h: 80, l: 63 }];
                return `<div style="padding:10px;">
                    <div style="text-align:center;padding:16px 0 20px;">
                        <div style="font-size:64px;">☀️</div>
                        <div style="font-size:48px;font-weight:200;margin:8px 0;">72°F</div>
                        <div style="opacity:0.6;font-size:14px;">Sunny — San Francisco</div>
                        <div style="display:flex;justify-content:center;gap:24px;margin-top:14px;font-size:12px;opacity:0.6;">
                            <span>💧 65%</span><span>💨 10 mph</span><span>UV 5</span>
                        </div>
                    </div>
                    <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:14px;display:flex;justify-content:space-around;">
                        ${days.map(d => `<div style="text-align:center;font-size:12px;"><div style="opacity:0.5;margin-bottom:6px;">${d.d}</div><div style="font-size:22px;margin-bottom:6px;">${d.i}</div><div>${d.h}°</div><div style="opacity:0.4;">${d.l}°</div></div>`).join('')}
                    </div>
                </div>`;
            },


            initWifi() {
                const saved = localStorage.getItem('webos_wifi');
                if (saved !== null) {
                    this.wifiConnected = saved === 'true';
                }
                const savedNet = localStorage.getItem('webos_wifi_network');
                if (savedNet) this.wifiNetwork = savedNet;
                this.updateWifiDisplay();
            },

            toggleWifi() {
                this.wifiConnected = !this.wifiConnected;
                localStorage.setItem('webos_wifi', this.wifiConnected);
                this.updateWifiDisplay();
                this.renderWifiTrayBody();
                const btn = document.getElementById('wifiTrayToggle');
                if (btn) {
                    btn.textContent = this.wifiConnected ? 'On' : 'Off';
                    btn.classList.toggle('on', this.wifiConnected);
                }
                if (this.wifiConnected) {
                    this.notify('📶 WiFi connected to ' + this.wifiNetwork);
                } else {
                    this.notify('📵 WiFi disconnected');
                }
            },

            toggleWifiFromTray() {
                this.toggleWifi();
            },

            toggleWifiTray() {
                const tray = document.getElementById('wifiTray');
                if (!tray) return;
                const isShown = tray.classList.contains('show');
                tray.classList.toggle('show', !isShown);
                if (!isShown) {
                    this.renderWifiTrayBody();
                    const btn = document.getElementById('wifiTrayToggle');
                    if (btn) {
                        btn.textContent = this.wifiConnected ? 'On' : 'Off';
                        btn.classList.toggle('on', this.wifiConnected);
                    }
                }
            },

            renderWifiTrayBody() {
                const body = document.getElementById('wifiTrayBody');
                if (!body) return;
                if (!this.wifiConnected) {
                    body.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.5;font-size:13px;">WiFi is turned off</div>';
                    return;
                }
                const sigIcons = ['📶', '📶', '📶', '📶'];
                body.innerHTML = this.wifiNetworks.map(n => {
                    const connected = this.wifiConnected && this.wifiNetwork === n.name;
                    return `<div class="wifi-network-item${connected ? ' connected' : ''}" onclick="OS.connectToWifi('${n.name}')">
                        <span class="wifi-sig">${sigIcons[n.signal]}</span>
                        <div class="wifi-info">
                            <div class="wifi-label">${n.name}</div>
                            <div class="wifi-status">${connected ? 'Connected' : (n.secured ? 'Secured' : 'Open')}</div>
                        </div>
                        <span class="wifi-lock">${n.secured ? '🔒' : ''}</span>
                    </div>`;
                }).join('');
            },

            connectToWifi(networkName) {
                this.wifiNetwork = networkName;
                this.wifiConnected = true;
                localStorage.setItem('webos_wifi', 'true');
                localStorage.setItem('webos_wifi_network', networkName);
                this.updateWifiDisplay();
                this.renderWifiTrayBody();
                this.notify('📶 Connected to ' + networkName);
            },

            updateWifiDisplay() {
                const icon = document.getElementById('wifiIcon');
                const name = document.getElementById('wifiName');
                if (icon) icon.textContent = this.wifiConnected ? '📶' : '📵';
                if (name) name.textContent = this.wifiConnected ? 'On' : 'Off';
            },


            initLockScreen() {
                const lockBtn = document.getElementById('lockBtn');
                const lockInput = document.getElementById('lockPassword');
                if (lockBtn) lockBtn.addEventListener('click', () => this.unlockScreen());
                if (lockInput) {
                    lockInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') this.unlockScreen();
                    });
                    setTimeout(() => lockInput.focus(), 2200);
                }
                this.updateLockClock();
            },

            updateLockClock() {
                const timeEl = document.getElementById('lockTime');
                const dateEl = document.getElementById('lockDate');
                if (!timeEl || !dateEl) return;
                const now = new Date();
                timeEl.textContent = now.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
                dateEl.textContent = now.toLocaleDateString('en-US', {
                    weekday: 'long',
                    month: 'long',
                    day: 'numeric'
                });
            },

            unlockScreen() {
                const lockScreen = document.getElementById('lockScreen');
                if (!lockScreen) return;
                lockScreen.classList.add('hide');
                setTimeout(() => {
                    lockScreen.style.display = 'none';
                }, 500);
                this.createDesktopIcons();
                this.notify('👋 Welcome back!');
            },

            lockSystem() {
                const lockScreen = document.getElementById('lockScreen');
                if (lockScreen) {
                    lockScreen.style.display = 'flex';


                    setTimeout(() => lockScreen.classList.remove('hide'), 10);
                }
                const pass = document.getElementById('lockPassword');
                if (pass) {
                    pass.value = '';
                    pass.focus();
                }
                const qs = document.getElementById('quickSettingsPanel');
                if (qs) qs.classList.remove('show');



                this.windows.forEach(w => this.closeWindow(w.id));

                this.notify('🔒 System locked');
            },

            notify(message) {
                const container = document.getElementById('notifications');
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                container.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'slideInRight 0.3s ease reverse';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            },




            setupEventListeners() {
                document.getElementById('desktopIcons').addEventListener('contextmenu', (e) => e.preventDefault());

                document.getElementById('taskbarSearchBtn').addEventListener('click', () => this.openSearchOverlay());

                const overlayInput = document.getElementById('searchOverlayInput');
                if (overlayInput) {
                    overlayInput.addEventListener('input', (e) => this.handleTaskbarSearch(e.target.value));
                }
                document.getElementById('searchOverlayClose').addEventListener('click', () => this.closeSearchOverlay());
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('#searchOverlay') && !e.target.closest('#taskbarSearchBtn')) {
                        this.closeSearchOverlay();
                    }
                    if (!e.target.closest('#quickSettingsPanel') && !e.target.closest('#quickSettingsButton')) {
                        this.toggleQuickSettings(false);
                    }
                    if (!e.target.closest('#wifiTray') && !e.target.closest('#wifiWidget')) {
                        const tray = document.getElementById('wifiTray');
                        if (tray) tray.classList.remove('show');
                    }
                    if (!e.target.closest('.context-menu')) {
                        this.hideContextMenu();
                    }
                });



                document.addEventListener('keydown', (e) => {
                    if (e.altKey && e.key === 'n') {
                        e.preventDefault();
                        this.openWindow('notes');
                    }
                    if (e.altKey && e.key === 'c') {
                        e.preventDefault();
                        this.openWindow('calculator');
                    }
                    if (e.altKey && e.key === 't') {
                        e.preventDefault();
                        this.openWindow('terminal');
                    }
                    if (e.altKey && e.key === 's') {
                        e.preventDefault();
                        this.openWindow('settings');
                    }
                    if (e.altKey && e.key === 'b') {
                        e.preventDefault();
                        this.openWindow('browser');
                    }
                    if (e.altKey && e.key === 'o') {
                        e.preventDefault();
                        this.openWindow('todo');
                    }
                    if (e.altKey && e.key === 'p') {
                        e.preventDefault();
                        this.openWindow('paint');
                    }

                    if (this.activeWindow && this.activeWindow.appId === 'calculator') {
                        this.handleCalcKeyboard(e);
                    }
                });


                document.getElementById('desktop').addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const menu = document.getElementById('contextMenu');
                    menu.innerHTML = `
                        <div class="context-menu-item" onclick="OS.openWindow('notes'); OS.hideContextMenu()">
                            📝 Notes (Alt+N)
                        </div>
                        <div class="context-menu-item" onclick="OS.openWindow('calculator'); OS.hideContextMenu()">
                            🧮 Calculator (Alt+C)
                        </div>
                        <div class="context-menu-item" onclick="OS.openWindow('todo'); OS.hideContextMenu()">
                            ✓ Todo (Alt+O)
                        </div>
                        <div class="context-menu-item" onclick="OS.openWindow('browser'); OS.hideContextMenu()">
                            🌐 Browser (Alt+B)
                        </div>
                        <div class="context-menu-item" onclick="OS.openWindow('terminal'); OS.hideContextMenu()">
                            💻 Terminal (Alt+T)
                        </div>
                        <div class="context-menu-item" onclick="OS.openWindow('settings'); OS.hideContextMenu()">
                            ⚙️ Settings (Alt+S)
                        </div>
                        <div class="context-menu-item" onclick="OS.openWindow('paint'); OS.hideContextMenu()">
                            🎨 Paint (Alt+P)
                        </div>
                    `;
                    menu.classList.add('show');
                    menu.style.left = e.clientX + 'px';
                    menu.style.top = e.clientY + 'px';
                });

            }
        };


        OS.init();
    </script>
</body>
